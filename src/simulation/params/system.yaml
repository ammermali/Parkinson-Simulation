stop.at: 500
random.seed: 42

external.population:
  neurons: 20
  microglia: 15
  astrocytes: 15
  alpha: 0

world:
  height: 10
  width: 10
  buffer_size: 2

logging:
  enabled: true
  run_id: default_run
  output_dir: src/simulation/output/logs
  causal:
    enabled: true
  initialization:
    enabled: true
  scalar_stdout: true
  tick_metrics_csv: true
  progress_stdout: true
  progress_interval: 25
  summary_stdout: true
