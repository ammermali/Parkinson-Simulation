stop.at: 500
random.seed: 42

external.population:
  neurons: 21
  microglia: 15
  astrocytes: 15
  alpha: 0

external.movement:
  enabled: true
  move_radius: 1
  neuron_probability: 0.0
  astrocyte_probability: 0.08
  alpha_probability: 0.35
  aggregate_probability: 0.08
  lewy_body_probability: 0.02

world:
  height: 10
  width: 10
  buffer_size: 2

logging:
  enabled: true
  run_id: default_run
  output_dir: output
  causal:
    enabled: true
  events:
    enabled: true
  initialization:
    enabled: true
  spatial:
    enabled: true
  scalar_stdout: true
  tick_metrics_csv: true
  progress_stdout: true
  progress_interval: 25
  stage_stdout: true
  stage_first_ticks: 3
  stage_interval: 25
  summary_stdout: true
